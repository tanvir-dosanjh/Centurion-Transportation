<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - Centurion Transportation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

<!-- Header -->
<header>
  <h1>Book Your Ride</h1>
  <p>Request a quote or schedule your transportation today</p>
</header>

<!-- Contact Info -->
<section>
  <h2>Contact Information</h2>
  <p>Email: transportationcenturion@gmail.com</p>
  <p>Phone: (XXX) XXX-XXXX</p>
</section>

<!-- Booking Form -->
<section>
  <h2>Request a Booking</h2>

  <form action="https://formsubmit.co/transportationcenturion@gmail.com" method="POST">

    <!-- Prevent captcha -->
    <input type="hidden" name="_captcha" value="false">

    <!-- Email subject -->
    <input type="hidden" name="_subject" value="New Transportation Booking Request">

    <!-- Form fields -->
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="tel" name="phone" placeholder="Your Phone Number" required>

    <textarea name="message" placeholder="Enter pickup location, destination, date, time, and trip details..." required></textarea>

    <button type="submit">Request Booking</button>
  </form>

</section>

<!-- Footer -->
<footer>
  &copy; 2025 Centurion Transportation. All rights reserved.
</footer>

</body>
</html>
