<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reviews - Centurion Transportation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navigation -->
<nav>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="about.html">About</a>
  <a href="reviews.html" class="active">Reviews</a>
  <a href="contact.html">Contact</a>
</nav>

<header>
  <h1>Customer Reviews</h1>
  <p>See what our customers are saying and leave your own review</p>
</header>

<!-- Display Reviews -->
<section>
  <h2>What Our Customers Say</h2>
  <div id="reviewsList" class="services"></div>
</section>

<!-- Review Form -->
<section>
  <h2>Leave a Review</h2>

  <form id="reviewForm">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="rating" placeholder="Rating (1-5 ⭐)" required>
    <textarea id="review" placeholder="Write your review..." required></textarea>
    <button type="submit">Submit Review</button>
  </form>
</section>

<footer>
  &copy; 2025 Centurion Transportation. All rights reserved.
</footer>

<!-- Script -->
<script>
  const form = document.getElementById("reviewForm");
  const reviewsList = document.getElementById("reviewsList");

  // Load reviews from localStorage
  function loadReviews() {
    reviewsList.innerHTML = "";
    const reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    reviews.forEach(r => {
      const div = document.createElement("div");
      div.className = "service-card";

      div.innerHTML = `
        <h3>⭐ ${r.rating}</h3>
        <p>"${r.review}"</p>
        <p>- ${r.name}</p>
      `;

      reviewsList.appendChild(div);
    });
  }

  // Handle form submit
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const rating = document.getElementById("rating").value;
    const review = document.getElementById("review").value;

    const newReview = { name, rating, review };

    const reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviews.unshift(newReview);

    localStorage.setItem("reviews", JSON.stringify(reviews));

    form.reset();
    loadReviews();
  });

  // Initial load
  loadReviews();
</script>

</body>
</html>
