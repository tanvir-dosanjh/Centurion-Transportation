<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reviews - Centurion Transportation</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-container">
    
    <div class="menu-toggle" id="menu-toggle">
      ☰
    </div>

    <div class="nav-links" id="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html" class="active">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="reviews.html">Reviews</a>
    </div>

  </div>
</nav>
<header>
  <h1>Customer Reviews</h1>
  <p>See what our customers are saying and leave your own review</p>
</header>

<!-- Reviews Display -->
<section>
  <h2>What Our Customers Say</h2>
  <div id="reviewsList" class="services"></div>
</section>

<!-- Review Form -->
<section>
  <h2>Leave a Review</h2>

  <form id="reviewForm">
    <input type="text" id="name" placeholder="Your Name" required>

    <input 
      type="number" 
      id="rating" 
      placeholder="Rating (1-5)" 
      min="1" 
      max="5" 
      required
    >

    <textarea id="review" placeholder="Write your review..." required></textarea>

    <button type="submit">Submit Review</button>
  </form>
</section>

<footer>
  &copy; 2025 Centurion Transportation. All rights reserved.
</footer>

<script>
  const form = document.getElementById("reviewForm");
  const reviewsList = document.getElementById("reviewsList");

  // Convert number rating → stars
  function generateStars(rating) {
    let stars = "";
    for (let i = 0; i < rating; i++) {
      stars += "⭐";
    }
    return stars;
  }

  // Load reviews
  function loadReviews() {
    reviewsList.innerHTML = "";

    const reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    reviews.forEach(r => {
      const div = document.createElement("div");
      div.className = "service-card";

      div.innerHTML = `
        <h3>${generateStars(r.rating)} (${r.rating}/5)</h3>
        <p>"${r.review}"</p>
        <p>- ${r.name}</p>
      `;

      reviewsList.appendChild(div);
    });
  }

  // Handle form submit
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const rating = parseInt(document.getElementById("rating").value);
    const review = document.getElementById("review").value.trim();

    // Validate rating
    if (rating < 1 || rating > 5) {
      alert("Please enter a rating between 1 and 5.");
      return;
    }

    const newReview = { name, rating, review };

    const reviews = JSON.parse(localStorage.getItem("reviews")) || [];
    reviews.unshift(newReview);

    localStorage.setItem("reviews", JSON.stringify(reviews));

    form.reset();
    loadReviews();
  });

  // Initial load
  loadReviews();
</script>
<script>
  const toggle = document.getElementById("menu-toggle");
  const links = document.getElementById("nav-links");

  toggle.addEventListener("click", () => {
    links.classList.toggle("active");
  });
</script>
</body>
</html>
